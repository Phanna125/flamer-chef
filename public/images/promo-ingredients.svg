<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#warmGlow)"/>

  <!-- Ginger root -->
  <g transform="translate(200, 200) rotate(-15)" opacity="0.7">
    <path d="M 0 0 Q 30 -20, 70 -10 Q 100 -5, 120 -25 Q 90 10, 60 5 Q 30 10, 0 0Z" fill="#C8A951" stroke="#B8963A" stroke-width="1"/>
    <path d="M 70 -10 Q 85 -40, 100 -50" fill="none" stroke="#C8A951" stroke-width="8" stroke-linecap="round"/>
    <path d="M 40 -5 Q 30 -35, 20 -45" fill="none" stroke="#C8A951" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Garlic bulb -->
  <g transform="translate(500, 180)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#F5F0E1" stroke="#E8DFC8" stroke-width="1"/>
    <ellipse cx="-20" cy="-5" rx="18" ry="42" fill="#EDE5D0" transform="rotate(-10 -20 -5)"/>
    <ellipse cx="20" cy="-5" rx="18" ry="42" fill="#EDE5D0" transform="rotate(10 20 -5)"/>
    <path d="M -5 -50 Q 0 -65, 5 -50" fill="none" stroke="#8B7355" stroke-width="2"/>
  </g>

  <!-- Lemongrass stalks -->
  <g transform="translate(600, 100) rotate(25)" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="300" stroke="#7CB342" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="20" y2="280" stroke="#8BC34A" stroke-width="5" stroke-linecap="round"/>
    <line x1="-15" y1="30" x2="-15" y2="260" stroke="#689F38" stroke-width="4" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M 0 0 Q -40 -20, -60 -50" fill="none" stroke="#7CB342" stroke-width="3"/>
    <path d="M 20 20 Q 60 0, 80 -30" fill="none" stroke="#8BC34A" stroke-width="2.5"/>
  </g>

  <!-- Chili peppers -->
  <g transform="translate(150, 350) rotate(20)" opacity="0.6">
    <path d="M 0 0 Q 15 -3, 80 -5 Q 70 3, 0 0Z" fill="#E53935" stroke="#C62828" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-15" y2="-5" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(180, 380) rotate(-10)" opacity="0.5">
    <path d="M 0 0 Q 12 -4, 65 -8 Q 55 2, 0 0Z" fill="#F44336" stroke="#D32F2F" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-12" y2="3" stroke="#66BB6A" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Star anise -->
  <g transform="translate(420, 350)" opacity="0.4">
    <g fill="#8D6E63" stroke="#6D4C41" stroke-width="0.5">
      <polygon points="0,-30 8,-10 0,-15 -8,-10"/>
      <polygon points="0,-30 8,-10 0,-15 -8,-10" transform="rotate(45)"/>
      <polygon points="0,-30 8,-10 0,-15 -8,-10" transform="rotate(90)"/>
      <polygon points="0,-30 8,-10 0,-15 -8,-10" transform="rotate(135)"/>
      <polygon points="0,-30 8,-10 0,-15 -8,-10" transform="rotate(180)"/>
      <polygon points="0,-30 8,-10 0,-15 -8,-10" transform="rotate(225)"/>
      <polygon points="0,-30 8,-10 0,-15 -8,-10" transform="rotate(270)"/>
      <polygon points="0,-30 8,-10 0,-15 -8,-10" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="#5D4037"/>
  </g>

  <!-- Kaffir lime leaves -->
  <g transform="translate(680, 350)" opacity="0.45">
    <ellipse cx="0" cy="-15" rx="20" ry="30" fill="#2E7D32" transform="rotate(-10)"/>
    <ellipse cx="0" cy="25" rx="18" ry="28" fill="#388E3C" transform="rotate(5)"/>
    <line x1="0" y1="-45" x2="0" y2="53" stroke="#1B5E20" stroke-width="1.5"/>
  </g>

  <!-- Scattered peppercorns -->
  <g fill="#333" opacity="0.35">
    <circle cx="300" cy="400" r="4"/>
    <circle cx="315" cy="410" r="3.5"/>
    <circle cx="290" cy="415" r="3"/>
    <circle cx="310" cy="425" r="4"/>
    <circle cx="325" cy="395" r="3"/>
    <circle cx="280" cy="405" r="3.5"/>
  </g>

  <!-- Subtle vignette -->
  <rect width="800" height="500" fill="url(#bg)" opacity="0.3"/>
</svg>
